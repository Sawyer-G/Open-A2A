# Open-A2A 完整部署（与 OpenClaw 等 Agent 运行时配合）
#
# 用法:
#   1. 复制 .env.example 为 .env，配置 OPENCLAW_GATEWAY_URL、OPENCLAW_HOOKS_TOKEN
#   2. docker compose -f docker-compose.deploy.yml up -d
#
# 注意: Open-A2A Bridge 当前为占位，完整实现见 docs/zh/09-deployment-and-openclaw-integration.md

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
    restart: unless-stopped

  solid:
    image: aveltens/solid-server:latest
    ports:
      - "8443:8443"
    restart: unless-stopped

  # Bridge 占位：需根据 09-deployment-and-openclaw-integration.md 实现
