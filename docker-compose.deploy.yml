# Open-A2A 完整部署（与 OpenClaw 等 Agent 运行时配合）
#
# 用法:
#   1. 复制 .env.example 为 .env，配置 OPENCLAW_GATEWAY_URL、OPENCLAW_HOOKS_TOKEN
#   2. docker compose -f docker-compose.deploy.yml up -d
#
# Bridge 需 OPENCLAW_GATEWAY_URL、OPENCLAW_HOOKS_TOKEN 才能转发意图到 OpenClaw

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
    restart: unless-stopped

  solid:
    image: aveltens/solid-server:latest
    ports:
      - "8443:8443"
    restart: unless-stopped

  open-a2a-bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    ports:
      - "8080:8080"
    environment:
      - NATS_URL=nats://nats:4222
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-}
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN:-}
      - BRIDGE_ENABLE_FORWARD=${BRIDGE_ENABLE_FORWARD:-1}
    depends_on:
      - nats
    restart: unless-stopped
