# Open-A2A Full Quickstart (NATS + Relay + Solid + Bridge)
#
# This compose file is meant for development / testing and quick end-to-end demos.
# For an operator-grade public node, prefer: deploy/node-x/docker-compose.node-x.yml
#
# Usage (from repo root):
#   cp .env.example .env
#   docker compose -f deploy/quickstart/docker-compose.full.yml --env-file .env up -d --build

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
    restart: unless-stopped

  relay:
    build:
      context: ../..
      dockerfile: Dockerfile.relay
    environment:
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - RELAY_WS_HOST=0.0.0.0
      - RELAY_WS_PORT=8765
    ports:
      - "8765:8765"
    depends_on:
      - nats
    restart: unless-stopped

  solid:
    image: aveltens/solid-server:latest
    ports:
      - "8443:8443"
    restart: unless-stopped

  open-a2a-bridge:
    build:
      context: ../..
      dockerfile: Dockerfile.bridge
    ports:
      - "8080:8080"
    environment:
      - NATS_URL=nats://nats:4222
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-}
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN:-}
      - BRIDGE_ENABLE_FORWARD=${BRIDGE_ENABLE_FORWARD:-1}
      - BRIDGE_ENABLE_DISCOVERY=${BRIDGE_ENABLE_DISCOVERY:-1}
      - BRIDGE_AGENT_ID=${BRIDGE_AGENT_ID:-openclaw-agent}
      - BRIDGE_CAPABILITIES=${BRIDGE_CAPABILITIES:-intent.food.order}
      - BRIDGE_META_JSON=${BRIDGE_META_JSON:-}
    depends_on:
      - nats
    restart: unless-stopped

