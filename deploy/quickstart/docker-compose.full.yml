# Open-A2A Full Quickstart (NATS + Relay + Solid + Bridge)
#
# This compose file is meant for development / testing and quick end-to-end demos.
# For an operator-grade public node, prefer: deploy/node-x/docker-compose.node-x.yml
#
# Usage (from repo root):
#   cp .env.example .env
#   docker compose -f deploy/quickstart/docker-compose.full.yml --env-file .env up -d --build

services:
  # One-shot preflight that blocks startup in strict mode when defaults are unsafe.
  security-gate:
    image: python:3.11-alpine
    command: ["python", "/security_gate.py"]
    environment:
      - OA2A_STRICT_SECURITY=${OA2A_STRICT_SECURITY:-0}
      - RELAY_WS_HOST=${RELAY_WS_HOST:-0.0.0.0}
      - RELAY_AUTH_TOKEN=${RELAY_AUTH_TOKEN:-}
      - BRIDGE_ENABLE_DISCOVERY=${BRIDGE_ENABLE_DISCOVERY:-1}
      - BRIDGE_DISCOVERY_REGISTER_TOKEN=${BRIDGE_DISCOVERY_REGISTER_TOKEN:-}
      - BRIDGE_DISCOVERY_DISCOVER_TOKEN=${BRIDGE_DISCOVERY_DISCOVER_TOKEN:-}
    volumes:
      - ./security_gate.py:/security_gate.py:ro
    restart: "no"

  nats:
    image: nats:latest
    # Quickstart is demo-oriented; keep NATS private by default.
    # For operator-grade/public NATS access, use deploy/node-x/ and tighten auth/TLS/ACLs.
    restart: unless-stopped
    depends_on:
      security-gate:
        condition: service_completed_successfully

  relay:
    build:
      context: ../..
      dockerfile: Dockerfile.relay
    environment:
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - OA2A_STRICT_SECURITY=${OA2A_STRICT_SECURITY:-0}
      - RELAY_WS_HOST=${RELAY_WS_HOST:-0.0.0.0}
      - RELAY_WS_PORT=${RELAY_WS_PORT:-8765}
      - RELAY_AUTH_TOKEN=${RELAY_AUTH_TOKEN:-}
      - RELAY_SUBJECT_ALLOWLIST=${RELAY_SUBJECT_ALLOWLIST:-intent.>,open_a2a.>,_INBOX.open_a2a.>}
      - RELAY_SUBJECT_BLOCKLIST=${RELAY_SUBJECT_BLOCKLIST:-}
      - RELAY_MAX_SUBSCRIPTIONS_PER_CONN=${RELAY_MAX_SUBSCRIPTIONS_PER_CONN:-128}
      - RELAY_MAX_MESSAGE_BYTES=${RELAY_MAX_MESSAGE_BYTES:-65536}
      - RELAY_MAX_JSON_BYTES=${RELAY_MAX_JSON_BYTES:-262144}
      - RELAY_RL_PUB_PER_SEC=${RELAY_RL_PUB_PER_SEC:-30}
      - RELAY_HTTP_ENABLE=${RELAY_HTTP_ENABLE:-1}
      - RELAY_HTTP_HOST=${RELAY_HTTP_HOST:-127.0.0.1}
      - RELAY_HTTP_PORT=${RELAY_HTTP_PORT:-8766}
    ports:
      - "${RELAY_WS_PORT:-8765}:${RELAY_WS_PORT:-8765}"
    depends_on:
      security-gate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    restart: unless-stopped

  solid:
    image: aveltens/solid-server:latest
    ports:
      - "8443:8443"
    restart: unless-stopped
    depends_on:
      security-gate:
        condition: service_completed_successfully

  open-a2a-bridge:
    build:
      context: ../..
      dockerfile: Dockerfile.bridge
    ports:
      - "8080:8080"
    environment:
      - NATS_URL=nats://nats:4222
      - OA2A_STRICT_SECURITY=${OA2A_STRICT_SECURITY:-0}
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-}
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN:-}
      - BRIDGE_ENABLE_FORWARD=${BRIDGE_ENABLE_FORWARD:-1}
      - BRIDGE_ENABLE_DISCOVERY=${BRIDGE_ENABLE_DISCOVERY:-1}
      - BRIDGE_AGENT_ID=${BRIDGE_AGENT_ID:-openclaw-agent}
      - BRIDGE_CAPABILITIES=${BRIDGE_CAPABILITIES:-intent.food.order}
      - BRIDGE_META_JSON=${BRIDGE_META_JSON:-}
      - BRIDGE_ENABLE_META_PROOF=${BRIDGE_ENABLE_META_PROOF:-0}
      - BRIDGE_PUBLIC_URL=${BRIDGE_PUBLIC_URL:-}
      - BRIDGE_DID_SEED_B64=${BRIDGE_DID_SEED_B64:-}
      - BRIDGE_DISCOVERY_DEFAULT_TTL_SECONDS=${BRIDGE_DISCOVERY_DEFAULT_TTL_SECONDS:-60}
      - BRIDGE_DISCOVERY_CLEANUP_INTERVAL_SECONDS=${BRIDGE_DISCOVERY_CLEANUP_INTERVAL_SECONDS:-5}
      - BRIDGE_DISCOVERY_PERSIST_PATH=${BRIDGE_DISCOVERY_PERSIST_PATH:-}
      - BRIDGE_DISCOVERY_REDIS_URL=${BRIDGE_DISCOVERY_REDIS_URL:-}
      - BRIDGE_DISCOVERY_REGISTER_TOKEN=${BRIDGE_DISCOVERY_REGISTER_TOKEN:-}
      - BRIDGE_DISCOVERY_DISCOVER_TOKEN=${BRIDGE_DISCOVERY_DISCOVER_TOKEN:-}
      - BRIDGE_DISCOVERY_RL_PER_MINUTE=${BRIDGE_DISCOVERY_RL_PER_MINUTE:-60}
    depends_on:
      security-gate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    restart: unless-stopped

