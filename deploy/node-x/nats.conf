# Node X minimal NATS config (auth + basic permissions)
#
# Notes:
# - This is intentionally minimal and copyable.
# - For production hardening, consider enabling TLS, rate limits, and more granular subject ACLs.

port: 4222

# http: 8222  # Optional monitoring endpoint (keep private)

authorization: {
  users: [
    # Used by Relay (WebSocket <-> NATS)
    {
      user: "relay"
      password: "change-me-relay-pass"
      permissions: {
        publish: ["intent.>", "open_a2a.>", "_INBOX.>"]
        subscribe: ["intent.>", "open_a2a.>", "_INBOX.>"]
      }
    }

    # Used by Bridge (HTTP API + optional OpenClaw adapter)
    {
      user: "bridge"
      password: "change-me-bridge-pass"
      permissions: {
        publish: ["intent.>", "open_a2a.>", "_INBOX.>"]
        subscribe: ["intent.>", "open_a2a.>", "_INBOX.>"]
      }
    }

    # Optional: allow advanced users to connect directly to NATS
    # If you expose 4222 publicly, you MUST change the password and tighten permissions.
    {
      user: "agent_public"
      password: "change-me-public-pass"
      permissions: {
        publish: ["intent.>", "open_a2a.>", "_INBOX.>"]
        subscribe: ["intent.>", "open_a2a.>", "_INBOX.>"]
      }
    }
  ]
}

